<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --bg: #edf2f7;
            --panel: #ffffff;
            --panel-2: #f8fbff;
            --text: #10233f;
            --muted: #5c6b82;
            --accent: #2563eb;
            --accent-strong: #173b8f;
            --border: #d8e2f0;
            --shadow: 0 20px 60px rgba(15, 23, 42, 0.14);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 58%, #dde8f7 100%);
            display: flex;
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .main {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: min(760px, 100%);
            min-height: min(78vh, 760px);
            height: auto;
            background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
            display: none;
            padding: 28px;
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .options {
            background-color: transparent;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 12px;
            min-height: 0;
            overflow-y: auto;
            padding-right: 4px;
        }

        .option {
            border: 1px solid var(--border);
            padding: 15px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
            cursor: pointer;
        }

        .option:hover {
            transform: translateY(-1px);
            border-color: #9db8ea;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.08);
        }

        .mcqnumber {
            position: static;
            z-index: 1;
            margin-bottom: 10px;
            color: var(--accent);
            font-weight: 700;
        }

        .question {
            position: static;
            z-index: 1;
            margin-bottom: 18px;
            color: var(--accent-strong);
            font-size: clamp(1.05rem, 2.5vw, 1.3rem);
            line-height: 1.45;
            font-weight: 600;
        }

        .next {
            z-index: 1;
            border-radius: 999px;
            width: 104px;
            height: 44px;
            border: none;
            background: linear-gradient(135deg, var(--accent) 0%, #1d4ed8 100%);
            color: white;
            font-weight: 700;
            box-shadow: 0 14px 26px rgba(37, 99, 235, 0.22);
        }

        .restart {
            z-index: 1;
            border-radius: 999px;
            width: 124px;
            height: 44px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.95);
            color: var(--accent-strong);
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 18px;
        }

        .end-screen {
            display: flex;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 18px;
            padding: 24px 12px;
        }

        .end-title {
            font-size: clamp(1.5rem, 3vw, 2.2rem);
            color: var(--accent-strong);
        }

        .end-score {
            font-size: 1.05rem;
            color: var(--muted);
        }

        .restart-end {
            width: min(100%, 220px);
            height: 48px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent) 0%, #1d4ed8 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            box-shadow: 0 16px 28px rgba(37, 99, 235, 0.24);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .restart-end:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 32px rgba(37, 99, 235, 0.28);
        }

        .hidemain {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%);
            display: block;
            position: fixed;
        }

        .startquiz {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-direction: column;
            padding: 20px;
            text-align: center;
        }

        .starttext {
            color: white;
            max-width: 22rem;
            line-height: 1.4;
        }

        .start {
            width: 130px;
            height: 45px;
            border-radius: 24px;
            border: none;
            background: white;
            color: var(--accent-strong);
            font-weight: 700;
        }

        .hidemain input {
            padding: 10px;
            width: 177px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.38);
            background: rgba(255, 255, 255, 0.94);
            color: var(--accent-strong);

        }

        .tempelem {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            z-index: 1000;
        }

        .spinner {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            border: 8px solid rgba(255, 255, 255, 0.18);
            border-top-color: white;
            animation: spin 0.9s linear infinite;
            box-shadow: 0 0 0 10px rgba(255, 255, 255, 0.05);
        }

        .loading-text {
            font-size: 1.1rem;
            font-weight: 600;
            padding: 0 20px;
            text-align: center;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .main {
                padding: 14px;
            }

            .container {
                min-height: min(82vh, 760px);
                padding: 20px;
                border-radius: 22px;
            }

            .next,
            .restart {
                height: 40px;
            }
        }

        @media (max-width: 480px) {
            .container {
                min-height: 86vh;
                padding: 16px;
            }

            .options {
                gap: 10px;
            }

            .option {
                padding: 13px 14px;
                border-radius: 14px;
            }

            .question {
                margin-bottom: 14px;
                font-size: 1rem;
            }

            .actions {
                flex-direction: column;
                align-items: stretch;
            }

            .start {
                width: min(100%, 220px);
            }

            .hidemain input {
                width: min(100%, 240px);
            }
        }
    </style>
</head>

<body>
    <div class="hidemain">
        <div class="startquiz">
            <div class="starttext">
                <h3>
                    test your programming knowledge
                </h3>
            </div>
            <button class="start" onclick="start()">
                Start Quiz
            </button>
            <input type="number" class="inputtext" placeholder="Enter number of questions (1-50)" min="1" max="50">
        </div>
    </div>
    <div class="main">

        <div class="container">
            <div class="mcqnumber">
                <h5>Number 1</h5>
            </div>
            <div class="question">
                <p>what is yor name</p>
            </div>
            <div class="options">

            </div>
            <div class="actions">
                <button class="restart" onclick="restartQuiz()">Restart Quiz</button>
                <button class="next">Next</button>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="script.js"></script>
</body>

</html>
